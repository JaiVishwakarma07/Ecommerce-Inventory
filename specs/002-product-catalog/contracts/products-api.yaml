openapi: 3.1.0
info:
  title: ECOM_OPPO Products API Contract
  version: 1.0.0
  description: |
    Product catalog and admin inventory CRUD.
    Public read endpoints; admin-only writes via Bearer JWT (role=admin).
    List responses are a plain JSON array (no pagination envelope).
servers:
  - url: http://127.0.0.1:8000
paths:
  /products:
    get:
      summary: List products
      description: |
        Public. Returns Product[].
        Optional search matches name, sku, or category (case-insensitive partial).
        When limit is omitted, all matching products are returned (no silent cap).
        When limit is provided, results are capped at min(limit, 100).
      security: []
      tags: [products]
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive partial match on name, sku, or category
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Admin list cap (e.g. 100). Omit for browse (no limit).
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      summary: Create product
      description: Admin only. Full product body required.
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductWrite"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate SKU
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/ValidationError"

  /products/{product_id}:
    get:
      summary: Get product by id
      security: []
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Replace product
      description: Admin only. Full product body (PUT semantics).
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductWrite"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate SKU
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: Delete product
      description: Admin only. Hard delete.
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    ProductWrite:
      type: object
      required:
        - name
        - description
        - sku
        - price
        - quantity
        - category
        - image_url
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        sku:
          type: string
          minLength: 1
          maxLength: 255
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        quantity:
          type: integer
          minimum: 0
        category:
          type: string
          minLength: 1
          maxLength: 100
        image_url:
          type: string
          default: ""
          maxLength: 2048

    Product:
      allOf:
        - $ref: "#/components/schemas/ProductWrite"
        - type: object
          required:
            - id
            - created_at
            - updated_at
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    Forbidden:
      description: Authenticated user is not admin
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    NotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"

security:
  - bearerAuth: []
