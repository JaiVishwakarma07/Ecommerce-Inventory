openapi: 3.1.0
info:
  title: ECOM_OPPO Auth API Contract
  version: 1.0.0
  description: Auth foundation contract for register/login/me with JWT bearer tokens.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
paths:
  /:
    get:
      summary: Service status
      security: []
      tags: [health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: ecom-oppo-api }

  /auth/register:
    post:
      summary: Register a new user
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: Email already registered
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      summary: Login with email and password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: Invalid credentials
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login-form:
    post:
      summary: OAuth2-compatible form login for Swagger tooling
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: Invalid credentials
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/me:
    get:
      summary: Get current user profile
      tags: [auth]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        full_name: { type: string, minLength: 1 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    UserProfile:
      type: object
      required: [id, email, full_name, role, created_at]
      properties:
        id: { type: integer, format: int64 }
        email: { type: string, format: email }
        full_name: { type: string }
        role: { type: string, enum: [customer, admin] }
        created_at: { type: string, format: date-time }

    AuthResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token: { type: string }
        token_type: { type: string, example: bearer }
        user:
          $ref: "#/components/schemas/UserProfile"

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

  responses:
    Unauthorized:
      description: Missing, invalid, or expired bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
          example:
            detail: Not authenticated
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
