openapi: 3.1.0
info:
  title: ECOM_OPPO Orders API Contract
  version: 1.0.0
  description: |
    Customer checkout and order management.
    All routes require Bearer JWT. Checkout requires role=customer.
    Admin list/PATCH require role=admin.
    List responses are plain Order[] (no pagination envelope).
servers:
  - url: http://127.0.0.1:8000
paths:
  /orders:
    post:
      summary: Place order (checkout)
      description: |
        Customer only (role=customer). Admin receives 403.
        Snapshots product_name and unit_price from catalog at checkout.
        Decrements product stock atomically with order creation.
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin cannot checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      summary: List all orders (admin)
      description: |
        Admin only. Newest first.
        Optional status filter (exact match).
        Optional limit capped at 100.
      tags: [orders]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /orders/me:
    get:
      summary: List my orders
      description: Authenticated user. Returns orders for current user only, newest first.
      tags: [orders]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /orders/{order_id}:
    get:
      summary: Get order by id
      description: Order owner or admin.
      tags: [orders]
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not order owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /orders/{order_id}/status:
    patch:
      summary: Update order status (admin)
      description: |
        Admin only. Free status transitions in v1.
        Transition to cancelled restocks inventory once per order.
      tags: [orders]
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    OrderStatus:
      type: string
      enum:
        - pending
        - processing
        - shipped
        - delivered
        - cancelled

    OrderLineItemCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
          format: int64
          minimum: 1
        quantity:
          type: integer
          minimum: 1

    OrderCreate:
      type: object
      required: [shipping_address, items]
      properties:
        shipping_address:
          type: string
          minLength: 1
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLineItemCreate"

    OrderLineItem:
      type: object
      required:
        - id
        - product_id
        - product_name
        - quantity
        - unit_price
      properties:
        id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        product_name:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          minimum: 0

    Order:
      type: object
      required:
        - id
        - user_id
        - status
        - total_amount
        - shipping_address
        - created_at
        - updated_at
        - items
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/OrderStatus"
        total_amount:
          type: number
          minimum: 0
        shipping_address:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderLineItem"

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    Forbidden:
      description: Authenticated user lacks required role or ownership
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    NotFound:
      description: Order or product not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"

security:
  - bearerAuth: []
